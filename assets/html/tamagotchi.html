<section id="tamagotchi" class="hidden">
  <div class="card center" style="display:flex; flex-direction:column; align-items:center; gap:16px; margin-top:20px; position: relative;">
    
    <button id="tamaAlbumBtn" class="btn" style="position: absolute; top: 10px; right: 10px; font-size: 16px; padding: 5px 10px;" title="Album zwierzaków">📖 Album</button>

    <div id="tamaMainView" style="display:flex; flex-direction:column; align-items:center; width: 100%;">
      <h2 style="margin:0; padding-right: 80px;">Mój Zwierzak</h2>
      <div id="tamaPet" style="font-size:100px; transition: transform 0.3s; animation: tama-idle 2s infinite alternate; cursor:pointer;">🥚</div>
      <h3 id="tamaName" style="margin:0; color:var(--accent); font-size:24px;">Jajko</h3>
      
      <div class="xp-bar-wrap" style="width:100%; max-width:300px; height:12px; margin-top:8px;">
        <div class="xp-bar-fill" id="tamaXpFill" style="width:0%; background:linear-gradient(90deg, #10b981, #34d399);"></div>
      </div>
      <p class="sub" id="tamaStatus">Zdobywaj punkty XP w grach, aby zwierzak rósł!</p>
      
      <div style="width: 100%; max-width: 350px; background: rgba(0,0,0,0.1); border-radius: 12px; padding: 10px; margin-top: 5px;">
        <h4 style="margin: 0 0 10px 0; font-size: 16px;">Menu karmienia:</h4>
        <div id="tamaFoodOptions" style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
            <!-- dynamically rendered food -->
        </div>
      </div>
      
      <div style="display:flex; gap:10px; margin-top:15px;">
          <button class="btn" id="tamaPetBtn" style="min-width:120px; display:flex; flex-direction:column; align-items:center; line-height:1.2; padding:8px;">
              <span>👋 Pogłaszcz</span>
              <span style="font-size:0.8em; opacity:0.8;">(Darmowe)</span>
          </button>
      </div>
      <p class="sub small" id="tamaMessage" style="height:20px; margin:0; color:var(--good); font-weight:bold;"></p>
    </div>

    <div id="tamaAlbumView" style="display:none; flex-direction:column; align-items:center; width: 100%;">
      <h2 style="margin:0 0 15px 0">Album Zwierzaków</h2>
      <p class="sub" style="margin-top:0;">Tutaj mieszkają Twoje wszystkie zwierzaki!</p>
      <div id="tamaAlbumList" style="display:flex; flex-direction:column; gap: 15px; width: 100%; max-width: 400px; max-height: 400px; overflow-y: auto; padding: 5px;">
        <!-- dynamically rendered album list -->
      </div>
      <button id="tamaBackBtn" class="btn" style="margin-top:20px;">Wróć do zwierzaka</button>
    </div>

  </div>
</section>
