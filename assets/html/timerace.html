<section id="timerace" class="card hidden">
  <div class="row" style="justify-content:space-between; flex-wrap:wrap; gap:6px;">
    <span class="pill" title="Pozostały czas">⏱️ Czas: <b id="trTime">60s</b></span>
    <span class="pill" title="Zdobyte punkty">🔥 Wynik: <b id="trScore">0</b></span>
  </div>
  <div class="center" style="margin:top:12px; margin-bottom:6px">
    <div class="imgwrap" style="max-width:520px;margin:0 auto" id="trVisual"></div>
  </div>
  <div class="choices" id="trOptions"></div>
  <div class="row" style="margin-top:10px; justify-content:center; gap:10px;">
    <button class="btn secondary" id="trMenuBtn">🏠 Start</button>
    <button class="btn secondary" id="trGamesBtn">🎮 Ćwiczenia</button>
  </div>

  <div id="trSummary" class="summary hidden">
    <div class="big">Koniec czasu! ⏰</div>
    <div class="star-rating" id="trStarRating"></div>
    <div class="muted" id="trFinalStats"></div>
    <div class="muted" id="trSumExtra"></div>
    <div class="row" style="margin-top:12px">
      <button class="btn secondary" id="trMenuSumBtn">🏠 Start</button>
      <button class="btn secondary" id="trGamesSumBtn">🎮 Ćwiczenia</button>
      <button class="btn" id="trRetryBtn">⟳ Zagraj ponownie</button>
    </div>
  </div>
</section>
