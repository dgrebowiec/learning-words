<section id="finditem" class="card hidden">
  <div class="row" style="justify-content:space-between; flex-wrap:wrap; gap:6px;">
    <span class="pill" title="Numer pytania w bieżącej rundzie">Pytanie: <b id="fNum">1</b>/<span id="fTotal">10</span></span>
    <span class="pill" title="Twój obecny wynik w tej rundzie">Wynik: <b id="fScore">0</b></span>
    <span class="pill" title="Aktualna i najlepsza seria poprawnych odpowiedzi">Seria: <b id="fStreak">0</b> (rek.: <span id="fBestStreak">0</span>)</span>
    <div class="star-game-widget pill" title="Postęp do kolejnej gwiazdki">⭐ <b id="findStarCount">0</b> <div class="star-segs" id="findStarSegs"></div></div>
  </div>
  <div class="scorebar" aria-hidden="true" style="margin:10px 0 14px 0"><span id="fFill"></span></div>
  <div class="center" style="margin-bottom:6px">
    <div class="word" id="fEs">manzana</div>
    <div class="sub" id="fPl" style="display: none">(jabłko)</div>
    <div class="row" style="margin-top:6px">
      <button class="btn" id="fSpeak">🔁 Powtórz słowo (ES)</button>
    </div>
  </div>
  <div class="choices" id="itemChoices"></div>
  <div class="row" style="margin-top:10px; justify-content:space-between;">
    <div class="row" style="gap:8px">
      <button class="btn secondary" id="fMenuBtn">🏠 Menu</button>
      <button class="btn secondary" id="fSkip">Pomiń</button>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn secondary" id="fRetry">⟳ Zagraj ponownie (nowy zestaw)</button>
      <button class="btn" id="fNext">Następne pytanie</button>
    </div>
  </div>

  <div id="fSummary" class="summary hidden">
    <div class="big" id="fSummaryTitle">Podsumowanie</div>
    <div class="star-rating" id="fStarRating"></div>
    <div><b>Wynik:</b> <span id="fSumScore">0</span>/<span id="fSumTotal">0</span> (<span id="fSumPct">0</span>%)</div>
    <div class="muted">Najlepsza seria: <b id="fSumBestStreak">0</b> • Czas: <b id="fSumTime">0.0 s</b> • Rekord czasu: <b id="fSumBestTime">—</b></div>
    <div class="row" style="margin-top:6px">
      <button class="btn secondary" id="fSumMenu">🏠 Menu</button>
      <button class="btn secondary" id="fSumGames">🎮 Wybierz ćwiczenie</button>
      <button class="btn secondary hidden" id="fSumReview">🔁 Powtórz błędne</button>
      <button class="btn" id="fSumRetry">⟳ Zagraj ponownie</button>
    </div>
    <p class="muted hidden" id="fMistakeSuccess">Brak błędnych odpowiedzi – świetna robota!</p>
    <div id="fMistakeInfo" class="summary-mistakes hidden">
      <p class="muted" id="fMistakeHeader">Błędne odpowiedzi: <span id="fMistakeCount">0</span></p>
      <ul id="fMistakeList" class="mistake-list"></ul>
    </div>
  </div>
</section>
