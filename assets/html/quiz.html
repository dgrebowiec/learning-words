<section id="quiz" class="card hidden">
  <div class="row" style="justify-content:space-between; flex-wrap:wrap; gap:6px;">
    <span class="pill" title="Numer pytania w bieżącej rundzie">Pytanie: <b id="qNum">1</b>/<span id="qTotal">10</span></span>
    <span class="pill" title="Twój obecny wynik w tej rundzie">Wynik: <b id="qScore">0</b></span>
    <span class="pill" title="Aktualna i najlepsza seria poprawnych odpowiedzi">Seria: <b id="qStreak">0</b> (rek.: <span id="qBestStreak">0</span>)</span>
    <div class="star-game-widget pill" title="Postęp do kolejnej gwiazdki">⭐ <b id="quizStarCount">0</b> <div class="star-segs" id="quizStarSegs"></div></div>
  </div>
  <div class="scorebar" aria-hidden="true" style="margin:10px 0 14px 0"><span id="scoreFill"></span></div>
  <div class="center" style="margin-bottom:6px">
    <div class="imgwrap" style="max-width:520px;margin:0 auto" id="qVisual"></div>
    <div class="sub" id="qHint">po polsku: jabłko</div>
    <div class="row" style="margin-top:6px">
      <button class="btn" id="qSpeak">🔁 Powtórz słowo (ES)</button>
    </div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="row" style="margin-top:10px; justify-content:space-between;">
    <div class="row" style="gap:8px">
      <button class="btn secondary" id="qMenuBtn">🏠 Menu</button>
      <button class="btn secondary" id="qPrev">Wróć</button>
      <button class="btn secondary" id="qSkip">Pomiń</button>
    </div>
    <div class="row" style="gap:8px">
      <button class="btn secondary" id="qRetry">⟳ Zagraj ponownie (nowy zestaw)</button>
      <button class="btn" id="qNext">Następne pytanie</button>
    </div>
  </div>

  <div id="qSummary" class="summary hidden">
    <div class="big" id="qSummaryTitle">Podsumowanie</div>
    <div class="star-rating" id="qStarRating"></div>
    <div><b>Wynik:</b> <span id="qSumScore">0</span>/<span id="qSumTotal">0</span> (<span id="qSumPct">0</span>%)</div>
    <div class="muted">Najlepsza seria: <b id="qSumBestStreak">0</b> • Czas: <b id="qSumTime">0.0 s</b> • Rekord czasu: <b id="qSumBestTime">—</b></div>
    <div class="row" style="margin-top:6px">
      <button class="btn secondary" id="qSumMenu">🏠 Menu</button>
      <button class="btn secondary" id="qSumGames">🎮 Wybierz ćwiczenie</button>
      <button class="btn secondary hidden" id="qSumReview">🔁 Powtórz błędne</button>
      <button class="btn" id="qSumRetry">⟳ Zagraj ponownie</button>
    </div>
    <p class="muted hidden" id="qMistakeSuccess">Brak błędnych odpowiedzi – świetna robota!</p>
    <div id="qMistakeInfo" class="summary-mistakes hidden">
      <p class="muted" id="qMistakeHeader">Błędne odpowiedzi: <span id="qMistakeCount">0</span></p>
      <ul id="qMistakeList" class="mistake-list"></ul>
    </div>
  </div>
</section>
