<section id="balloons" class="hidden">
  <div class="row" style="justify-content:space-between; margin-bottom:15px">
    <button class="btn btn-secondary" id="balloonsMenuBtn">← Wróć</button>
    <div class="pill">❤️ <span id="balloonsLives">3</span></div>
    <div class="pill">⭐ <span id="balloonsScore">0</span>/<span id="balloonsTarget">10</span></div>
  </div>

  <div class="card" style="text-align:center; padding:15px; margin-bottom:20px; background:linear-gradient(135deg, rgba(34,211,238,.1), rgba(96,165,250,.1)); border-color:rgba(34,211,238,.3);">
    <h2 style="margin:0 0 10px; font-size:24px;">Znajdź kolor:</h2>
    <div style="font-size:36px; font-weight:bold; color:var(--primary-color);" id="balloonsTargetWord">rojo</div>
    <button class="btn btn-secondary" id="balloonsSpeakBtn" style="margin-top:10px; font-size:20px;">🔊 Posłuchaj</button>
  </div>

  <div id="balloonsContainer" style="position:relative; width:100%; height:300px; overflow:hidden; border:2px dashed var(--border-color); border-radius:12px; background:rgba(0,0,0,0.2);">
    <!-- Balony będą tutaj wrzucane przez JS -->
  </div>

  <div id="balloonsSummary" class="hidden" style="margin-top:20px; text-align:center;">
    <div class="card">
      <h2 style="font-size:28px; margin-bottom:10px;">Koniec gry! 🎈</h2>
      <p style="font-size:18px; margin-bottom:15px;" id="balloonsFinalMsg"></p>
      <div class="row" style="justify-content:center; gap:10px;">
        <button class="btn btn-secondary" id="balloonsSumMenuBtn">Menu</button>
        <button class="btn" id="balloonsRetryBtn">Zagraj ponownie</button>
      </div>
    </div>
  </div>
</section>
