<header class="app-header">
  <div class="header-top">
    <h1 class="app-title">
      <span class="grad">Hiszpański</span>
      <span class="app-title-tail">dla dzieci</span>
    </h1>
    <button class="btn secondary header-menu-btn" id="toMenuBtn" aria-label="Wróć do ekranu ćwiczeń">
      <span id="toMenuBtnIcon">🎮</span>
      <span id="toMenuBtnLabel">Ćwiczenia</span>
    </button>
  </div>

  <div class="header-meta" id="xpHeader">
    <span class="pill header-player-pill" id="activePlayerDisplay" style="display:none" title="Zmień gracza" onclick="showProfileSelect()"></span>
    <span class="pill header-level-pill" id="xpLevelPill">🌱 Początkujący</span>
    <span class="pill" id="streakPill">🔥 0 dni</span>
    <div class="star-hdr-widget pill" id="headerStarWidget" title="Twoje gwiazdki i postęp do następnej">
      <span class="star-count">⭐ <b id="headerStarCount">0</b></span>
      <div class="star-segs" id="headerStarSegs"></div>
    </div>
  </div>

  <div class="header-progress">
    <span class="header-progress-label" id="xpTextPill">0 / 100 XP</span>
    <div class="xp-bar-wrap" id="xpBarWrap">
      <div class="xp-bar-fill" id="xpBarFill"></div>
    </div>
  </div>
</header>
