<section id="memory" class="card hidden">
  <div class="row" style="justify-content:space-between; flex-wrap:wrap; gap:6px;">
    <span class="pill">Pary: <b id="memPairs">0/0</b></span>
    <span class="pill">Czas: <b id="memTime">0.0 s</b></span>
    <div class="star-game-widget pill" title="Postęp do kolejnej gwiazdki">⭐ <b id="memStarCount">0</b> <div class="star-segs" id="memStarSegs"></div></div>
    <button class="btn secondary" id="memMenuBtn" style="padding:6px 12px; min-height:unset; font-size:12px">🏠 Menu</button>
    <button class="btn secondary" id="memGamesBtn" style="padding:6px 12px; min-height:unset; font-size:12px">🎮 Ćwiczenia</button>
  </div>
  
  <div class="center" style="margin:10px 0">
    <div class="memory-grid" id="memoryGrid"></div>
  </div>

  <div class="row" style="margin-top:10px; justify-content:center;">
    <button class="btn" id="memRetryBtn">⟳ Nowa gra</button>
  </div>

  <div id="memSummary" class="summary hidden">
    <div class="big">🎉 Brawo!</div>
    <div class="star-rating" id="memStarRating"></div>
    <div id="memFinalStats" class="muted">Ukończono w 0s</div>
    <div class="muted" id="memSumExtra"></div>
    <div class="row" style="margin-top:10px">
      <button class="btn secondary" id="memSumMenuBtn">🏠 Menu</button>
      <button class="btn secondary" id="memSumGamesBtn">🎮 Wybierz ćwiczenie</button>
      <button class="btn" id="memSumRetryBtn">⟳ Zagraj ponownie</button>
    </div>
  </div>
</section>
